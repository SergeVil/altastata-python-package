<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AltaStata gRPC-Web Users Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 960px; }
    h1 { margin-bottom: 10px; }
    .row { margin: 10px 0; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    textarea { min-height: 80px; font-family: monospace; }
    button { margin-top: 12px; padding: 8px 14px; cursor: pointer; }
    pre {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      padding: 10px;
      white-space: pre-wrap;
      min-height: 40px;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #d0d7de; padding: 8px; text-align: left; }
    th { background: #f6f8fa; }
    .hint { color: #57606a; font-size: 13px; }
  </style>
</head>
<body>
  <h1>AltaStata gRPC-Web Users Test</h1>
  <p class="hint">Hardcoded config in <code>app.js</code>. Click bootstrap, then list users.</p>
  <button id="bootstrapBtn">Bootstrap user</button>
  <button id="listUsersBtn">List users</button>

  <h3>Status</h3>
  <pre id="status">Idle</pre>

  <h3>Users</h3>
  <table>
    <thead>
      <tr>
        <th>User name</th>
      </tr>
    </thead>
    <tbody id="usersBody">
      <tr><td>No data yet</td></tr>
    </tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/dist/protobuf.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
