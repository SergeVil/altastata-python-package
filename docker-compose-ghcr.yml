version: '3.8'

# ARCH is set by update-version.sh or .env (arm64|amd64). Default: amd64.
# VERSION is from version.sh. Run ./update-version.sh to sync .env with version.sh.
services:
  altastata-jupyter:
    image: ghcr.io/sergevil/altastata/jupyter-datascience-${ARCH:-amd64}:${VERSION}
    container_name: altastata-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./examples/pytorch-example:/home/jovyan/pytorch-example
      - ./examples/tensorflow-example:/home/jovyan/tensorflow-example
      - ./altastata:/home/jovyan/altastata-source
      - jupyter-data:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=
      - JUPYTER_ALLOW_INSECURE_WRITES=1
    networks:
      - altastata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  jupyter-data:
    driver: local

networks:
  altastata-network:
    driver: bridge 