syntax = "proto3";

package altastata.v1;

option java_multiple_files = true;
option java_package = "com.altastata.grpc.proto";
option java_outer_classname = "AuthProto";

import "google/protobuf/timestamp.proto";

// Application-layer authentication for altastata-grpc.
//
// See altastata-grpc/SESSION_AND_EVENTS_DESIGN.md §5.
//
// Login validates the user's password on a transient AltaStataFileSystem
// (probe-then-install — see SESSION_AND_EVENTS_DESIGN.md §6 and PR #176)
// and issues an opaque per-tab session token of the form sess-<base64url>.
// Subsequent RPCs MUST present the token via "Authorization: Bearer <token>".
//
// Sessions have a sliding TTL (default 8 hours, configurable via
// ALTASTATA_GRPC_SESSION_TTL). Logout invalidates one session immediately;
// other sessions of the same user are unaffected.
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
}

message LoginRequest {
  string user_name = 1;
  string account_password = 2;

  // Free-form metadata for audit / "Sessions" panel display
  // (e.g. "Chrome 121, MacOS"). Optional.
  string client_hint = 3;
}

message LoginResponse {
  // Opaque token. Format: "sess-" + base64url(32 random bytes), no padding.
  string session_token = 1;

  google.protobuf.Timestamp expires_at = 2;

  // Echo of the user's accessKey for clients that need S3-style programmatic
  // access (RAG and other automation). Same value as today's
  // SetPasswordForUserResponse.access_key.
  string access_key = 3;
}

message LogoutRequest {}
message LogoutResponse {}

message RefreshRequest {}
message RefreshResponse {
  google.protobuf.Timestamp expires_at = 1;
}
