# AltaStata RAG – Open LLM (simple vector store + Transformers LLM + Web). Works on Mac and IBM 390.
# Usage:
#   1. Copy .env.example to .env and set ALTASTATA_ACCOUNT_DIR (path on host to your account dir).
#   2. docker compose up -d
#   3. Open http://localhost:8766 (app indexes sample_documents on first start if local_index is empty).
# Optional: set LLM_PROVIDER=ollama and start the ollama service to use Ollama instead of Transformers.
# Note: MLX is Mac-only; in Docker we always use transformers (or ollama if you add the ollama service).

services:
  app:
    build:
      context: ../..
      dockerfile: rag-example/open_llm/Dockerfile
    ports:
      - "8766:8000"
    environment:
      - LOCAL_INDEX_PATH=/app/open_llm/local_index
      # Force transformers in Docker (MLX is Mac-only and not installed in the image)
      - LLM_PROVIDER=transformers
      # TinyLlama: coherent answers (instruction-tuned). First query ~1–2 min on CPU; then ~30–60s. gpt2 is faster but gives gibberish.
      - HF_LLM_MODEL=${HF_LLM_MODEL:-TinyLlama/TinyLlama-1.1B-Chat-v1.0}
      - HF_LLM_MAX_NEW_TOKENS=${HF_LLM_MAX_NEW_TOKENS:-80}
      - QUERY_TIMEOUT=${QUERY_TIMEOUT:-300}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-smollm2:360m}
      - ALTASTATA_ACCOUNT_DIR=/altastata_account
      - ALTASTATA_PASSWORD=${ALTASTATA_PASSWORD:-123}
      - ALTASTATA_ACCOUNT_ID=${ALTASTATA_ACCOUNT_ID:-bob123}
    volumes:
      - ${ALTASTATA_ACCOUNT_DIR:-/tmp/altastata-account-must-set-in-env}:/altastata_account:ro
      - local_index_data:/app/open_llm/local_index
    restart: unless-stopped

  indexer:
    build:
      context: ../..
      dockerfile: rag-example/open_llm/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_INDEX_PATH=/app/open_llm/local_index
      - LLM_PROVIDER=transformers
      - HF_LLM_MODEL=${HF_LLM_MODEL:-TinyLlama/TinyLlama-1.1B-Chat-v1.0}
      - OLLAMA_BASE_URL=http://ollama:11434
      - ALTASTATA_ACCOUNT_DIR=/altastata_account
      - ALTASTATA_PASSWORD=${ALTASTATA_PASSWORD:-123}
      - ALTASTATA_ACCOUNT_ID=${ALTASTATA_ACCOUNT_ID:-bob123}
      - ALTASTATA_CALLBACK_PORT=25334
      - RAG_INDEX_PATH=${RAG_INDEX_PATH:-RAGDocs/policies}
    volumes:
      - ${ALTASTATA_ACCOUNT_DIR:-/tmp/altastata-account-must-set-in-env}:/altastata_account:ro
      - local_index_data:/app/open_llm/local_index
    ports:
      - "25334:25334"
    command: ["python", "indexer.py"]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  local_index_data:
