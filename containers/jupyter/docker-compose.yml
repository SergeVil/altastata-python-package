version: '3.8'

# Jupyter stack. Run from repo root: docker compose -f containers/jupyter/docker-compose.yml up -d
# ARCH is set by update-version.sh or .env (arm64|amd64). Default: amd64.
# VERSION is from version.sh. Run ./update-version.sh to sync.
services:
  altastata-jupyter:
    image: altastata/jupyter-datascience-${ARCH:-amd64}:${VERSION}
    build:
      context: ../..
      dockerfile: containers/jupyter/Dockerfile.${ARCH:-amd64}
    container_name: altastata-jupyter
    ports:
      # Bound to host loopback so the stack is reachable only from this
      # machine. Drop "127.0.0.1:" only behind a TLS-terminating proxy.
      # ALTASTATA_CONSOLE_UI_HOST_PORT lets you change the host-side port
      # without touching the container; default 9877. Set it to e.g. 9879
      # in .env if 9877 is occupied (Jupyter + RAG side-by-side: RAG default
      # is 9878).
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:${ALTASTATA_CONSOLE_UI_HOST_PORT:-9877}:9877"
    volumes:
      - ../../examples/pytorch-example:/home/jovyan/pytorch-example
      - ../../examples/tensorflow-example:/home/jovyan/tensorflow-example
      - ../../altastata:/home/jovyan/altastata-source
      - jupyter-data:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=
      - JUPYTER_ALLOW_INSECURE_WRITES=1
      # Console UI auto-starts by default in this stack. Set to 0 in .env for
      # Jupyter-only. ALTASTATA_GRPC_BIND_ADDRESS is baked in the image.
      - ENABLE_ALTASTATA_CONSOLE_UI=${ENABLE_ALTASTATA_CONSOLE_UI:-1}
    networks:
      - altastata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  jupyter-data:
    driver: local

networks:
  altastata-network:
    driver: bridge
