version: '3.8'

# Jupyter stack. Run from repo root: docker compose -f containers/jupyter/docker-compose.yml up -d
# ARCH is set by update-version.sh or .env (arm64|amd64). Default: amd64.
# VERSION is from version.sh. Run ./update-version.sh to sync.
services:
  altastata-jupyter:
    image: altastata/jupyter-datascience-${ARCH:-amd64}:${VERSION}
    build:
      context: ../..
      dockerfile: containers/jupyter/Dockerfile.${ARCH:-amd64}
    container_name: altastata-jupyter
    ports:
      # Bind both ports to host loopback only. The container is intended as a
      # local-developer convenience (Jupyter Lab + the AltaStata Console UI on
      # the same machine), not as a multi-user network service. Drop the
      # "127.0.0.1:" prefix only if you knowingly want to expose these on the
      # host's network — and add a TLS-terminating reverse proxy in front
      # before doing so.
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:9877:9877"
    volumes:
      - ../../examples/pytorch-example:/home/jovyan/pytorch-example
      - ../../examples/tensorflow-example:/home/jovyan/tensorflow-example
      - ../../altastata:/home/jovyan/altastata-source
      - jupyter-data:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=
      - JUPYTER_ALLOW_INSECURE_WRITES=1
      # altastata-grpc-server defaults to binding loopback inside the container,
      # which is unreachable from the host even with port forwarding. Inside a
      # container we want to listen on all interfaces so Docker's port mapping
      # can reach the process. Network exposure is bounded by the host-side
      # "127.0.0.1:" prefix above. See mycloud/altastata-grpc/TLS_DESIGN.md.
      - ALTASTATA_GRPC_BIND_ADDRESS=0.0.0.0
    networks:
      - altastata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  jupyter-data:
    driver: local

networks:
  altastata-network:
    driver: bridge
